<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Transfer</title>
  <link rel="stylesheet" href="style.css">
</head>

<body onload="checkAuth()">

<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2>NeoBank</h2>

    <a href="dashboard.html">🏠 Home</a>
    <a href="transfer.html">💸 Transfer</a>
    <a href="transactions.html">📊 History</a>
  </div>

  <!-- MAIN -->
  <div class="main">

    <div class="card">
      <h2>Send Money 💸</h2>
      <p class="muted">Enter recipient details below</p>

      <input id="acc" placeholder="Account Number">
      <input id="amount" placeholder="Amount">

      <button onclick="sendMoney()">Continue</button>

      <p id="status" class="muted" style="margin-top:10px;"></p>
    </div>

    <!-- RECEIPT -->
    <div class="card" id="receipt" style="display:none; margin-top:20px;">
      <h2 style="color:#22c55e;">Transfer Successful 🎉</h2>
      <p id="receiptText" class="muted"></p>
    </div>

  </div>

</div>

<script>
function checkAuth() {
  if (sessionStorage.getItem("loggedIn") !== "true") {
    window.location.href = "index.html";
  }
}

function sendMoney() {
  const acc = document.getElementById("acc").value;
  const amount = document.getElementById("amount").value;

  const status = document.getElementById("status");

  if (!acc || !amount) {
    status.innerText = "Fill all fields first";
    return;
  }

  status.innerText = "Verifying account...";

  setTimeout(() => {
    status.innerText = "Account verified ✔ Processing transfer...";

    setTimeout(() => {
      showReceipt(acc, amount);
    }, 1500);

  }, 1500);
}

function showReceipt(acc, amount) {
  document.getElementById("receipt").style.display = "block";

  document.getElementById("receiptText").innerText =
    `You sent $${amount} to account ${acc}. TXN ID: TXN${Math.floor(Math.random()*99999999)}`;
}
</script>
<script src="script.js"></script>
</body>
</html>
