<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NeoBank Login</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="auth">
  <div class="auth-box card">

    <h1 style="font-size:28px; font-weight:800;">Welcome back</h1>
    <p class="muted">Sign in to access your account</p>

    <input id="email" type="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button onclick="login()">Login</button>

    <p id="error" style="margin-top:12px; color:#ef4444;"></p>

  </div>
</div>

<script>
function login() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const validEmail = "theethanerivers@gmail.com";
  const validPass = "Incredibleman";

  if (email === validEmail && password === validPass) {
    sessionStorage.setItem("loggedIn", "true");
    window.location.href = "dashboard.html";
  } else {
    document.getElementById("error").innerText = "Invalid login details";
  }
}
</script>
<script src="script.js"></script>
</body>
</html>
